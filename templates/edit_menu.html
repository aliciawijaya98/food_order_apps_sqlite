{% extends "base.html" %}

{% block content %}

<h2>Edit Menu</h2>

<form method="POST">

<label>Category</label>
<input type="text" name="category" value="{{ menu.category }}">

<label>Item</label>
<input type="text" name="item" value="{{ menu.item }}">

<label>Price</label>
<input type="number" name="price" value="{{ menu.price }}">

<button type="submit">Update</button>

</form>

{% endblock %}

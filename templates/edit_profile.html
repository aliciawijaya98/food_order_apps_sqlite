{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}
<h1>Edit Profile</h1>

{% if msg %}<p style="color:green">{{ msg }}</p>{% endif %}

<form method="post">
    Name: <input name="name" value="{{ user.name }}"><br>
    Email: <input name="email" value="{{ user.email }}"><br>
    Job: <input name="job" value="{{ user.job }}"><br>
    Phone: <input name="phone" value="{{ user.phone }}"><br>
    Hobbies (comma-separated): <input name="hobbies" value="{{ user.hobby | join(', ') }}"><br>
    
    <h3>Address</h3>
    City: <input name="city" value="{{ user.address.city }}"><br>
    RT: <input name="rt" value="{{ user.address.rt }}"><br>
    RW: <input name="rw" value="{{ user.address.rw }}"><br>
    ZIP: <input name="zip" value="{{ user.address.zip }}"><br>
    Latitude: <input name="lat" value="{{ user.address.lat }}"><br>
    Longitude: <input name="long" value="{{ user.address.long }}"><br>
    
    <button type="submit">Save Changes</button>
</form>

<a href="{{ url_for('profile') }}">Back to Profile</a>
{% endblock %}

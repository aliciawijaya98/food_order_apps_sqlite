{% extends "base.html" %}

{% block content %}

<h2>Orders</h2>

<div class="dashboard">

<div class="card">
<h3>Today's Orders</h3>
<p>{{ sales.total_orders }}</p>
</div>

<div class="card">
<h3>Revenue Today</h3>
<p>Rp {{ sales.total_revenue }}</p>
</div>

</div>

<br>

<a href="{{ url_for('create_order_page') }}">
<button>Create Order</button>
</a>

<br><br>

<form method="POST" action="{{ url_for('orders') }}">

<input type="text" name="keyword" placeholder="Invoice Code / Table Number">

<button type="submit">Find Order</button>

</form>

{% endblock %}

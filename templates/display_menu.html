{% extends "base.html" %}
{% block content %}
<div class="container">
<h2>Menu</h2>
<a href="{{ url_for('add_menu') }}"><button>Add Item</button></a>

{% for idx, item in enumerate(menu) %}
<div class="card">
    <h3>{{ item.category }} - {{ item.item }}</h3>
    <p>Price: Rp{{ item.price }}</p>
    <a href="{{ url_for('edit_menu', index=idx) }}"><button>Edit</button></a>
    <a href="{{ url_for('delete_menu', index=idx) }}"><button>Delete</button></a>
</div>
{% endfor %}
</div>
{% endblock %}

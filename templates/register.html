{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}

<h1>Register</h1>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="post">

    <label for="uid">User ID</label><br>
    <input type="text" name="uid" id="uid" required><br><br>

    <label for="pw">Password</label><br>
    <input type="password" name="pw" id="pw" required><br><br>

    <label for="email">Email</label><br>
    <input type="email" name="email" id="email" required><br><br>

    <label for="name">Name</label><br>
    <input type="text" name="name" id="name" required><br><br>

    <label for="gender">Gender</label><br>
    <select name="gender" id="gender" required>
    <option value="">Select Gender</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    </select>
    <br><br>

    <label for="age">Age</label><br>
    <input type="number" name="age" id="age" required><br><br>

    <label for="job">Job</label><br>
    <input type="text" name="job" id="job" required><br><br>

    <label for="hobbies">Hobbies (comma-separated)</label><br>
    <input type="text" name="hobbies" id="hobbies" required><br><br>

    <label for="city">City</label><br>
    <input type="text" name="city" id="city" required><br><br>

    <label for="rt">RT</label><br>
    <input type="text" name="rt" id="rt" required><br><br>

    <label for="rw">RW</label><br>
    <input type="text" name="rw" id="rw" required><br><br>

    <label for="zip">ZIP</label><br>
    <input type="text" name="zip" id="zip" required><br><br>

    <label for="lat">Latitude</label><br>
    <input type="text" name="lat" id="lat" required><br><br>

    <label for="long">Longitude</label><br>
    <input type="text" name="long" id="long" required><br><br>

    <label for="phone">Phone</label><br>
    <input type="text" name="phone" id="phone" required><br><br>

    <button type="submit">Register</button>

</form>

<br>
<p>Already have an account?
   <a href="{{ url_for('login') }}">Login here</a>
</p>

{% endblock %}
